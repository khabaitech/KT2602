<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div.position {
        background-color: black;
        color: white;
        height: 100px;
        width: 100px;
        position: absolute;
        top: 400px;
        left: 200px;
      }
      div.two{
        background-color: blue;
        height: 100px;
        width: 100px;
        position: absolute;
        transform: translateX(15px);
      }
      div.three{
        background-color: aqua;
        height: 50px;
        width: 50px;
        transform: translateY(200px);
      }
      .four{
        background-color: blueviolet;
        height: 50px;
        width: 50px;
        transform: translateZ(200px);
      }
      .five{
        background-color: brown;
        height: 100px;
        width: 100px;
        translate: 400px;
        transform: rotate(45DEG)
      }
      .six{
        background-color: chartreuse;
        height: 75px;
        width: 75px;
        position: absolute;
        translate: 250px;
        transform: scale(2.5);
      }
      .seven{
        background-color: darkgreen;
        height: 100px;
        width: 100px;
        translate: 600px;
        transform: skew(45DEG);
      }
      .eight{
        background-color: dimgrey;
        height: 100px;
        width: 100px;
        position: absolute;
        translate: 800px;
        z-index: 19;
        opacity: 0.5;
      }
      .nine{
        background-color: orangered;
        height: 100px;
        width: 108px;
        position: absolute;
        translate: 800px;
        z-index: 11;
        
      }

    </style>
  </head>
  <body>
    <div class="position"> 
        give the position
    </div>
    <div class="two"> 
        translate x </div>
    <div class="three">
        translate y</div>
    <div class="four">
        translate z
    </div>
    <div class="five"> 
        rotate X
    </div>
    <div class="six">
        scale
    </div>
    <div class="seven">
        skew
    </div>
    <div class="eight">
     z- index
    </div>
    <div class="nine">
     z- index
    </div>
  </body>
</html>
